<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Thi Đấu — SBTC FC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }

        body {
            background: #111318;
            color: #fff;
            min-height: 100vh;
        }

        /* NAV */
        #top-nav {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(17, 19, 24, 0.97);
            z-index: 100;
            padding: 18px 40px;
            border-bottom: 1px solid rgba(232, 42, 99, 0.3);
        }

        .nav-container {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: #e82a63;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        .nav-back {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .nav-back:hover { color: #fff; }

        .nav-back svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* PAGE HEADER */
        .page-header {
            max-width: 680px;
            margin: 32px auto 8px;
            padding: 0 16px;
        }

        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        /* FIXTURES CONTAINER */
        #fixtures-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }

        /* COMPETITION SECTION */
        .competition-section {
            margin-bottom: 24px;
        }

        .competition-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #1c1f27;
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .comp-icon {
            width: 36px;
            height: 36px;
            background: rgba(232, 42, 99, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .comp-info {
            flex: 1;
            min-width: 0;
        }

        .comp-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .comp-sub {
            font-size: 0.78rem;
            color: #888;
            margin-top: 1px;
        }

        .comp-arrow {
            color: #555;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* FIXTURE ROW */
        .fixture-row {
            display: flex;
            align-items: center;
            background: #1c1f27;
            padding: 12px 16px;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .fixture-row:last-child {
            border-bottom: none;
            border-radius: 0 0 12px 12px;
        }

        /* left meta: round + status */
        .fixture-meta {
            width: 52px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 3px;
        }

        .fixture-round {
            font-size: 0.7rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            line-height: 1.2;
        }

        .fixture-status {
            font-size: 0.72rem;
            font-weight: 700;
            color: #e82a63;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .fixture-status.upcoming {
            color: #4caf7d;
        }

        /* center teams */
        .fixture-teams {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .team-logo {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1;
        }

        .team-logo.sbtc {
            background: rgba(232, 42, 99, 0.15);
            border-radius: 50%;
            border: 1px solid rgba(232, 42, 99, 0.4);
        }

        .sbtc-shield {
            width: 14px;
            height: 14px;
            fill: #e82a63;
        }

        .team-name {
            flex: 1;
            font-size: 0.88rem;
            font-weight: 500;
            color: #e8e8e8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .team-score {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            min-width: 18px;
            text-align: right;
        }

        .team-score.dash {
            color: #555;
            font-size: 0.75rem;
            font-weight: 400;
        }

        /* right star */
        .fav-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #444;
            font-size: 1.1rem;
            padding: 4px;
            flex-shrink: 0;
            transition: color 0.2s;
            line-height: 1;
        }

        .fav-btn:hover { color: #e82a63; }
        .fav-btn.active { color: #e82a63; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }

        .empty-state p {
            font-size: 1rem;
            margin-top: 12px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #e82a63;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.2s infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* upcoming date label */
        .fixture-date-label {
            font-size: 0.7rem;
            color: #4caf7d;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            #top-nav { padding: 14px 16px; }
            .page-header { margin-top: 20px; }
            .page-header h1 { font-size: 1.3rem; }
            .team-name { font-size: 0.82rem; }
        }
    </style>
</head>
<body>

    <nav id="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SBTC FC</a>
            <a href="index.html" class="nav-back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Về Trang Chủ
            </a>
        </div>
    </nav>

    <div class="page-header">
        <h1>Lịch Thi Đấu</h1>
    </div>

    <div id="fixtures-container">
        <div class="loading">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
        </div>
    </div>

    <script type="module">
        import { getFixtures } from './js/github-storage.js';

        const SBTC_SHIELD_SVG = `<svg class="sbtc-shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4z"/></svg>`;

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00');
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        function isUpcoming(f) {
            return f.sbtcScore === null || f.sbtcScore === undefined || f.sbtcScore === '';
        }

        function renderFixtures(fixtures) {
            const container = document.getElementById('fixtures-container');

            if (!fixtures || !fixtures.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:2.5rem">⚽</div>
                        <p>Chưa có trận đấu nào được lên lịch.</p>
                    </div>`;
                return;
            }

            // Group by competition
            const groups = {};
            fixtures.forEach(f => {
                const key = f.competition || 'Lịch Thi Đấu';
                if (!groups[key]) groups[key] = [];
                groups[key].push(f);
            });

            const html = Object.entries(groups).map(([comp, matches]) => {
                const rows = matches.map(f => {
                    const upcoming = isUpcoming(f);
                    const statusLabel = upcoming ? 'Sắp diễn ra' : 'KT';
                    const statusClass = upcoming ? 'upcoming' : '';
                    const sbtcScoreHtml = upcoming
                        ? `<span class="team-score dash">—</span>`
                        : `<span class="team-score">${f.sbtcScore}</span>`;
                    const oppScoreHtml = upcoming
                        ? `<span class="team-score dash">—</span>`
                        : `<span class="team-score">${f.opponentScore}</span>`;
                    const roundLabel = (f.round || '').length > 10
                        ? f.round.substring(0, 10) + '…'
                        : (f.round || '');

                    return `
                    <div class="fixture-row">
                        <div class="fixture-meta">
                            <span class="fixture-round">${roundLabel}</span>
                            ${upcoming
                                ? `<span class="fixture-date-label">${formatDate(f.date)}</span>`
                                : `<span class="fixture-status ${statusClass}">${statusLabel}</span>`
                            }
                        </div>
                        <div class="fixture-teams">
                            <div class="team-row">
                                <div class="team-logo sbtc">${SBTC_SHIELD_SVG}</div>
                                <span class="team-name">SBTC FC</span>
                                ${sbtcScoreHtml}
                            </div>
                            <div class="team-row">
                                <div class="team-logo">${f.opponentIcon || '⚽'}</div>
                                <span class="team-name">${f.opponent || 'TBD'}</span>
                                ${oppScoreHtml}
                            </div>
                        </div>
                        <button class="fav-btn" title="Yêu thích">☆</button>
                    </div>`;
                }).join('');

                return `
                <div class="competition-section">
                    <div class="competition-header">
                        <div class="comp-icon">🏆</div>
                        <div class="comp-info">
                            <div class="comp-name">${comp}</div>
                            <div class="comp-sub">Giải Đấu</div>
                        </div>
                        <div class="comp-arrow">›</div>
                    </div>
                    ${rows}
                </div>`;
            }).join('');

            container.innerHTML = html;

            // Fav button toggle
            container.querySelectorAll('.fav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.classList.toggle('active');
                    btn.textContent = btn.classList.contains('active') ? '★' : '☆';
                });
            });
        }

        async function init() {
            try {
                const data = await getFixtures();
                renderFixtures(data.fixtures || []);
            } catch (e) {
                document.getElementById('fixtures-container').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:2rem">⚠️</div>
                        <p>Không thể tải lịch thi đấu.</p>
                    </div>`;
            }
        }

        init();
    </script>

    <script src="./js/site-guard.js"></script>
</body>
</html>
