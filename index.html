<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">SBTC FC Landing Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #120a10;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Particle Canvas --- */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            transform: translateZ(0);
        }

        /* --- Navigation Bar --- */
        #top-nav {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(18, 10, 16, 0.95);
            z-index: 100;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(232, 42, 99, 0.3);
            opacity: 0;
            transition: opacity 0.8s ease-in;
            will-change: opacity;
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: #e82a63;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(232, 42, 99, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: color 0.2s, text-shadow 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffa5c2;
            text-shadow: 0 0 8px #e82a63;
        }

        /* --- Main Content & Tabs --- */
        #main-content {
            padding: 60px 20px;
            max-width: 1300px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.8s ease-in;
            will-change: opacity;
        }

        .header-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #e82a63;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(232, 42, 99, 0.4);
        }

        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #e82a63;
            color: #ffffff;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .tab-btn:hover, .tab-btn.active {
            background: #e82a63;
            color: white;
            box-shadow: 0 0 15px rgba(232, 42, 99, 0.6);
            transform: translateY(-2px);
        }

        /* --- Grid & Cards --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            justify-items: center;
        }

        .card {
            background-color: transparent;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 4 / 5;
            perspective: 1000px;
            cursor: pointer;
            animation: fadeInCard 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards;
            will-change: transform, opacity;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            will-change: transform;
        }

        .card:hover .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
        }

        .card-front {
            background: linear-gradient(135deg, #2a0b17 0%, #120a10 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .placeholder-mark {
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 900;
            text-shadow: 0 0 20px rgba(232, 42, 99, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #e82a63 0%, #610d2c 100%);
            color: white;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-back h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            word-wrap: break-word;
            width: 100%;
        }

        .card-back p {
            font-size: 1.3rem;
            margin: 8px 0;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 8px;
            width: 80%;
        }

        .card-back span {
            color: #ffa5c2;
            font-size: 1rem;
            display: block;
            margin-bottom: -3px;
            text-transform: uppercase;
        }

        /* --- Social Links --- */
        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            text-decoration: none;
            color: white;
            will-change: transform;
        }

        .social-icon:hover {
            background: white;
            color: #e82a63;
            transform: translateY(-3px);
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- Modals --- */
        .modal {
            display: flex;
            visibility: hidden;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 8, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            will-change: opacity, visibility;
        }

        .modal.show {
            visibility: visible;
            pointer-events: auto;
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a0b17 0%, #120a10 100%);
            border: 1px solid #e82a63;
            border-radius: 15px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            position: relative;
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            box-shadow: 0 10px 40px rgba(232, 42, 99, 0.2);
            text-align: center;
            will-change: transform, opacity;
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 2;
        }

        .close-btn:hover { color: #e82a63; }

        .modal-content h2 {
            color: #e82a63;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal-content p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 20px;
        }

        /* --- Tournament Slider --- */
        .tournament-slider {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(232, 42, 99, 0.3);
            min-height: 200px;
        }

        .slider-btn {
            background: transparent;
            border: 2px solid #e82a63;
            color: #e82a63;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            font-weight: bold;
            flex-shrink: 0;
            will-change: background, color;
        }

        .slider-btn:hover {
            background: #e82a63;
            color: white;
            box-shadow: 0 0 10px rgba(232, 42, 99, 0.5);
        }

        .tournament-info { flex: 1; text-align: center; }

        .tournament-info h3 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .tour-date {
            color: #ffa5c2;
            font-weight: bold;
            margin-bottom: 15px !important;
            font-size: 1rem !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Calendar --- */
        .calendar-wrapper {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            color: #333;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            user-select: none;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-month-btn {
            background: transparent;
            border: 1px solid rgba(232, 42, 99, 0.5);
            color: #e82a63;
            font-size: 1.2rem;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .nav-month-btn:hover { background: #e82a63; color: white; }

        .calendar-month-year {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e82a63;
            text-transform: uppercase;
        }

        .calendar-days-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #888;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            position: relative;
        }

        .calendar-day:hover:not(.empty) { background: #ffe3eb; color: #e82a63; }
        .calendar-day.active { background: #e82a63; color: white; box-shadow: 0 4px 10px rgba(232, 42, 99, 0.4); }
        .calendar-day.empty { cursor: default; }

        .match-indicator {
            width: 6px;
            height: 6px;
            background-color: #e82a63;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }

        .calendar-day.active .match-indicator { background-color: #ffffff; }

        .match-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(18, 10, 16, 0.95);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 10;
            border: 1px solid #e82a63;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-weight: bold;
            will-change: transform, opacity;
        }

        .match-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #e82a63 transparent transparent transparent;
        }

        .calendar-day.has-match:hover .match-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }

        .btn-primary {
            background: #e82a63;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn-primary:hover { background: #ffa5c2; color: #120a10; }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; }
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .grid-container { grid-template-columns: 1fr; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <nav id="top-nav">
        <div class="nav-container">
            <div class="nav-logo" id="nav-logo">SBTC FC</div>
            <div class="nav-links">
                <a class="active" id="link-players">Đội Hình</a>
                <a id="link-schedule">Lịch Thi Đấu</a>
                <a id="link-tournaments">Giải Đấu</a>
                <a id="link-intro">Giới Thiệu</a>
            </div>
        </div>
    </nav>

    <div id="main-content">
        <h2 class="header-title" id="header-title">DANH SÁCH THI ĐẤU</h2>

        <div class="tabs-container">
            <button class="tab-btn active" data-type="players" id="tab-players">Danh Sách Cầu Thủ</button>
            <button class="tab-btn" data-type="coaches" id="tab-coaches">Ban Huấn Luyện</button>
        </div>

        <div class="grid-container" id="card-grid"></div>
    </div>

    <div id="modal-schedule" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Lịch Thi Đấu</h2>
            <div class="calendar-wrapper">
                <div class="calendar-header">
                    <button id="prev-month" class="nav-month-btn">&lt;</button>
                    <div class="calendar-month-year" id="cal-month-year"></div>
                    <button id="next-month" class="nav-month-btn">&gt;</button>
                </div>
                <div class="calendar-days-header">
                    <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
                </div>
                <div class="calendar-grid" id="cal-grid"></div>
            </div>
            <button class="btn-primary" onclick="alert('Bán vé đang được phát triển!')">Mua Vé</button>
        </div>
    </div>

    <div id="modal-tournaments" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Thông Tin Giải Đấu</h2>
            <div class="tournament-slider">
                <button id="prev-tour" class="slider-btn">&lt;</button>
                <div class="tournament-info">
                    <h3 id="tour-title">Loading...</h3>
                    <p id="tour-date" class="tour-date"></p>
                    <p id="tour-desc"></p>
                </div>
                <button id="next-tour" class="slider-btn">&gt;</button>
            </div>
        </div>
    </div>

    <div id="modal-intro" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="about-title">Về SBTC FC</h2>
            <div id="about-body"></div>
        </div>
    </div>

    <script type="module">
        import { getPlayers, getMatches, getTournaments, getSiteContent } from './js/github-storage.js';

        document.addEventListener("DOMContentLoaded", async () => {
            const topNav = document.getElementById("top-nav");
            const mainContent = document.getElementById("main-content");
            const gridContainer = document.getElementById("card-grid");
            const tabBtns = document.querySelectorAll(".tab-btn");

            setTimeout(() => {
                topNav.style.opacity = '1';
                mainContent.style.opacity = '1';
            }, 100);

            const fbIcon = `<svg viewBox="0 0 24 24"><path d="M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.15 16.45 6.15V8.62H15.19C13.95 8.62 13.56 9.39 13.56 10.18V12.06H16.34L15.89 14.96H13.56V21.96A10 10 0 0 0 22 12.06C22 6.53 17.5 2.04 12 2.04Z"/></svg>`;
            const ytIcon = `<svg viewBox="0 0 24 24"><path d="M21.58 7.19C21.36 6.33 20.67 5.64 19.81 5.42C18.25 5 12 5 12 5C12 5 5.75 5 4.19 5.42C3.33 5.64 2.64 6.33 2.42 7.19C2 8.75 2 12 2 12C2 12 2 15.25 2.42 16.81C2.64 17.67 3.33 18.36 4.19 18.58C5.75 19 12 19 12 19C12 19 18.25 19 19.81 18.58C20.67 18.36 21.36 17.67 21.58 16.81C22 15.25 22 12 22 12C22 12 22 8.75 21.58 7.19ZM10 15V9L15.2 12L10 15Z"/></svg>`;
            const nimoIcon = `<svg viewBox="0 0 24 24"><path d="M21 3H3C1.89 3 1 3.89 1 5V17C1 18.11 1.89 19 3 19H8V21H16V19H21C22.1 19 23 18.11 23 17V5C23 3.89 22.1 3 21 3ZM21 17H3V5H21V17ZM16 11L9 15V7L16 11Z"/></svg>`;

            // --- Load site content ---
            let siteContent = {};
            try {
                siteContent = await getSiteContent();
                document.getElementById('page-title').textContent = siteContent.pageTitle || 'SBTC FC';
                document.getElementById('nav-logo').textContent = siteContent.logoText || 'SBTC FC';
                document.getElementById('header-title').textContent = siteContent.headerTitle || 'DANH SÁCH THI ĐẤU';
                document.getElementById('tab-players').textContent = siteContent.tabPlayers || 'Danh Sách Cầu Thủ';
                document.getElementById('tab-coaches').textContent = siteContent.tabCoaches || 'Ban Huấn Luyện';
                document.getElementById('about-title').textContent = siteContent.aboutTitle || 'Về SBTC FC';
                const aboutBody = document.getElementById('about-body');
                (siteContent.aboutParagraphs || []).forEach(p => {
                    const el = document.createElement('p');
                    el.textContent = p;
                    aboutBody.appendChild(el);
                });
            } catch (e) {
                console.warn('Could not load site content:', e);
            }

            // --- Load players/coaches ---
            let playersData = [];
            let coachesData = [];
            try {
                const data = await getPlayers();
                playersData = data.players || [];
                coachesData = data.coaches || [];
            } catch (e) {
                console.warn('Could not load players:', e);
            }

            function renderCards(type) {
                gridContainer.innerHTML = '';
                const dataArray = type === 'players' ? playersData : coachesData;

                dataArray.forEach((item, index) => {
                    const animationDelay = `${Math.min(index * 0.04, 0.5)}s`;
                    let detailsHTML = '';
                    if (type === 'players') {
                        detailsHTML = `
                            <p><span>Number</span> ${item.num}</p>
                            <p><span>Position</span> ${item.pos}</p>
                        `;
                    } else {
                        detailsHTML = `<p><span>Role</span> ${item.role}</p>`;
                    }

                    const frontContent = item.photo
                        ? `<img src="${item.photo}" alt="${item.name}">`
                        : `<div class="placeholder-mark">?</div>`;

                    const socialLinks = `
                        <div class="social-links">
                            ${item.fb ? `<a href="${item.fb}" class="social-icon" target="_blank" title="Facebook">${fbIcon}</a>` : ''}
                            ${item.yt ? `<a href="${item.yt}" class="social-icon" target="_blank" title="YouTube">${ytIcon}</a>` : ''}
                            ${item.nimo ? `<a href="${item.nimo}" class="social-icon" target="_blank" title="NimoTV">${nimoIcon}</a>` : ''}
                        </div>
                    `;

                    gridContainer.innerHTML += `
                        <div class="card" style="animation-delay: ${animationDelay};">
                            <div class="card-inner">
                                <div class="card-front">${frontContent}</div>
                                <div class="card-back">
                                    <h2>${item.name}</h2>
                                    ${detailsHTML}
                                    ${socialLinks}
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            tabBtns.forEach(btn => {
                btn.addEventListener("click", function() {
                    tabBtns.forEach(b => b.classList.remove("active"));
                    this.classList.add("active");
                    renderCards(this.getAttribute("data-type"));
                });
            });

            renderCards('players');

            // --- Calendar ---
            let matchData = {};
            try {
                const data = await getMatches();
                (data.matches || []).forEach(m => { matchData[m.day] = { opponent: m.opponent, icon: m.icon }; });
            } catch (e) {
                console.warn('Could not load matches:', e);
            }

            let currentDate = new Date();
            let currentMonth = currentDate.getMonth();
            let currentYear = currentDate.getFullYear();

            function renderCalendar(month, year) {
                const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
                document.getElementById('cal-month-year').innerText = `${monthNames[month]} ${year}`;

                let firstDay = new Date(year, month, 1).getDay();
                let startDayIndex = firstDay === 0 ? 6 : firstDay - 1;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const grid = document.getElementById('cal-grid');
                grid.innerHTML = '';

                for (let i = 0; i < startDayIndex; i++) {
                    grid.innerHTML += `<div class="calendar-day empty"></div>`;
                }

                const today = new Date();
                const isCurrentMonthYear = today.getMonth() === month && today.getFullYear() === year;

                for (let i = 1; i <= daysInMonth; i++) {
                    let dayClass = 'calendar-day';
                    let innerHTML = i;
                    if (isCurrentMonthYear && i === today.getDate()) dayClass += ' active';
                    if (matchData[i]) {
                        dayClass += ' has-match';
                        innerHTML += `<div class="match-indicator"></div><div class="match-tooltip">vs ${matchData[i].opponent} ${matchData[i].icon}</div>`;
                    }
                    grid.innerHTML += `<div class="${dayClass}">${innerHTML}</div>`;
                }

                document.querySelectorAll('.calendar-day:not(.empty)').forEach(day => {
                    day.addEventListener('click', function() {
                        document.querySelectorAll('.calendar-day:not(.empty)').forEach(d => d.classList.remove('active'));
                        this.classList.add('active');
                    });
                });
            }

            document.getElementById("prev-month").addEventListener("click", () => {
                if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
                renderCalendar(currentMonth, currentYear);
            });

            document.getElementById("next-month").addEventListener("click", () => {
                if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
                renderCalendar(currentMonth, currentYear);
            });

            renderCalendar(currentMonth, currentYear);

            // --- Tournaments Slider ---
            let tournaments = [];
            try {
                const data = await getTournaments();
                tournaments = data.tournaments || [];
            } catch (e) {
                console.warn('Could not load tournaments:', e);
            }

            let currentTourIndex = 0;
            const tourTitle = document.getElementById("tour-title");
            const tourDate = document.getElementById("tour-date");
            const tourDesc = document.getElementById("tour-desc");

            function updateTournamentView() {
                if (!tournaments.length) return;
                tourTitle.innerText = tournaments[currentTourIndex].title;
                tourDate.innerText = tournaments[currentTourIndex].date;
                tourDesc.innerText = tournaments[currentTourIndex].desc;
            }

            document.getElementById("prev-tour").addEventListener("click", () => {
                currentTourIndex = (currentTourIndex - 1 + tournaments.length) % tournaments.length;
                updateTournamentView();
            });

            document.getElementById("next-tour").addEventListener("click", () => {
                currentTourIndex = (currentTourIndex + 1) % tournaments.length;
                updateTournamentView();
            });

            updateTournamentView();

            // --- Modals ---
            const modalSchedule = document.getElementById("modal-schedule");
            const modalTournaments = document.getElementById("modal-tournaments");
            const modalIntro = document.getElementById("modal-intro");

            document.getElementById("link-schedule").addEventListener("click", () => modalSchedule.classList.add("show"));
            document.getElementById("link-tournaments").addEventListener("click", () => modalTournaments.classList.add("show"));
            document.getElementById("link-intro").addEventListener("click", () => modalIntro.classList.add("show"));

            function closeAllModals() {
                modalSchedule.classList.remove("show");
                modalTournaments.classList.remove("show");
                modalIntro.classList.remove("show");
            }

            document.querySelectorAll(".close-btn").forEach(btn => btn.addEventListener("click", closeAllModals));
            window.addEventListener("click", e => {
                if (e.target === modalSchedule || e.target === modalIntro || e.target === modalTournaments) closeAllModals();
            });

            document.getElementById("link-players").addEventListener("click", () => {
                closeAllModals();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // --- Particles ---
            const canvas = document.getElementById("particles-canvas");
            const ctx = canvas.getContext("2d");
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            let particlesArray = [];
            const numberOfParticles = width > 768 ? 70 : 35;

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 1;
                    this.speedX = (Math.random() * 1) - 0.5;
                    this.speedY = (Math.random() * 1) - 0.5;
                    this.color = Math.random() > 0.5 ? 'rgba(232, 42, 99, 0.6)' : 'rgba(255, 255, 255, 0.3)';
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x > width || this.x < 0) this.speedX = -this.speedX;
                    if (this.y > height || this.y < 0) this.speedY = -this.speedY;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(Math.round(this.x), Math.round(this.y), this.size, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            function initParticles() {
                particlesArray = [];
                for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particlesArray.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateParticles);
            }

            initParticles();
            animateParticles();

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    initParticles();
                }, 250);
            });
        });
    </script>

    <script src="./js/site-guard.js"></script>
</body>
</html>
